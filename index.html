<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop watch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>



    <div id="area">

        <h1>Stop Watch</h1>
        <div id="display">00:00:00</div>
        <button class="b" onclick="start()">Start</button>

        <button class="b" onclick="stop()">Stop</button>

        <button class="b" onclick="reset()">Reset</button>

        <button class="b" id="lapbtn" onclick="addLap()">Lap</button>

        <div id="lap-container">

            <h3>Lap Times</h3>

            <ul id="laps">
            </ul>

        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
